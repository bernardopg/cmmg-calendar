name: cmmg-calendar

services:
  - name: web
    github:
      repo: bernardopg/cmmg-calendar
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    envs:
      - key: MAX_FILE_SIZE_MB
        value: "10"
        scope: RUN_TIME
        type: GENERAL
      - key: TOTVS_TIMEOUT_MS
        value: "30000"
        scope: RUN_TIME
        type: GENERAL
