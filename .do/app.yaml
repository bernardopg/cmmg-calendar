name: cmmg-calendar

services:
  - name: web
    github:
      repo: bernardopg/cmmg-calendar
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    instance_size_slug: basic-xxs
    instance_count: 1https://github.com/bernardopg/cmmg-calendar/pull/23/conflict?name=Dockerfile&base_oid=3bb218743a39d241342ba0e70a32aa4ffd788eeb&head_oid=9c42efeb2eaa86175b3e8bcb5726635ec603ced8
    http_port: 8080
    envs:
      - key: MAX_FILE_SIZE_MB
        value: "10"
        scope: RUN_TIME
        type: GENERAL
      - key: TOTVS_TIMEOUT_MS
        value: "30000"
        scope: RUN_TIME
        type: GENERAL
      - key: PORT
        value: "8080"
        scope: RUN_TIME
        type: GENERAL
